<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="app-title">Planner</title>
    <meta
      name="description"
      content="Statický planner pro vícedenní akce s výběrem programu, persistencí přes cookie a sdílením plánu."
    >
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%231f6b57'/%3E%3Cpath d='M18 16h28a4 4 0 0 1 4 4v24a4 4 0 0 1-4 4H18a4 4 0 0 1-4-4V20a4 4 0 0 1 4-4Z' fill='%23f8f3e7'/%3E%3Cpath d='M22 24h20M22 32h20M22 40h12' stroke='%231f6b57' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E"
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-block">
          <p id="brand-eyebrow" class="eyebrow">Planner</p>
          <h1 id="brand-title">Planner</h1>
          <p id="brand-copy" class="brand-copy">Načítám konfiguraci akce.</p>
        </div>

        <div class="toolbar-card">
          <div class="toolbar-row">
            <div id="event-switcher-group" class="toolbar-group" hidden>
              <span id="event-label" class="toolbar-label">Akce</span>
              <select id="event-switcher" class="toolbar-select field-input" aria-label="Výběr akce"></select>
            </div>

            <div class="toolbar-group">
              <span id="day-label" class="toolbar-label">Den</span>
              <div id="day-tabs" class="day-tabs" role="tablist" aria-label="Výběr dne"></div>
            </div>

            <div class="toolbar-group toolbar-group-actions">
              <span id="plan-label" class="toolbar-label">Plán</span>
              <button
                id="plan-actions-button"
                class="toolbar-link-button"
                type="button"
                aria-haspopup="dialog"
                aria-controls="plan-actions-panel"
                aria-expanded="false"
              >
                Načítám
              </button>
              <div id="toolbar-action-links" class="toolbar-action-links"></div>
            </div>
          </div>

          <div id="notice" class="notice" aria-live="polite"></div>
        </div>
      </header>

      <main class="content-grid">
        <section class="overview-section" aria-labelledby="overview-heading">
          <div class="section-heading">
            <div>
              <p id="overview-kicker" class="section-kicker">Přehled</p>
              <h2 id="overview-heading">Načítám</h2>
            </div>
          </div>

          <div id="overview-meta" class="overview-meta" aria-live="polite"></div>
          <div id="overview-cards" class="overview-cards"></div>
        </section>

        <section class="itinerary-section" aria-labelledby="itinerary-heading">
          <div class="section-heading">
            <div>
              <p id="itinerary-kicker" class="section-kicker">Itinerář</p>
              <h2 id="itinerary-heading">Načítám</h2>
            </div>
          </div>
          <div id="itinerary-content" class="itinerary-content"></div>
        </section>

        <section class="schedule-section" aria-labelledby="schedule-heading">
          <div class="section-heading schedule-heading">
            <div>
              <p id="schedule-kicker" class="section-kicker">Program</p>
              <h2 id="schedule-heading">Načítám</h2>
            </div>
          </div>
          <div id="schedule-content" class="schedule-content"></div>
        </section>
      </main>
    </div>

    <div id="plan-actions-backdrop" class="plan-actions-backdrop" hidden></div>
    <aside
      id="plan-actions-panel"
      class="plan-actions-panel"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="plan-actions-title"
    >
      <div class="plan-actions-card">
        <button
          id="plan-actions-close-button"
          class="plan-actions-close"
          type="button"
          data-close-plan-actions
          aria-label="Zavřít nabídku plánu"
        >
          ×
        </button>
        <p id="plan-kicker" class="section-kicker">Plán</p>
        <h2 id="plan-actions-title" class="plan-actions-title">Načítám</h2>
        <p id="plan-actions-copy" class="plan-actions-copy"></p>

        <div class="share-grid">
          <div class="share-card">
            <label id="share-code-label" class="field-label" for="share-code">Kód plánu</label>
            <div class="field-row">
              <input id="share-code" class="field-input" type="text" readonly>
              <button id="copy-code-button" class="secondary-button" type="button">Kopírovat</button>
            </div>
          </div>

          <div class="share-card">
            <label id="share-link-label" class="field-label" for="share-link">Sdílecí odkaz</label>
            <div class="field-row">
              <input id="share-link" class="field-input" type="text" readonly>
              <button id="copy-link-button" class="secondary-button" type="button">Kopírovat</button>
            </div>
          </div>

          <div class="share-card share-card-import">
            <label id="import-label" class="field-label" for="import-input">Import</label>
            <div class="field-row">
              <input
                id="import-input"
                class="field-input"
                type="text"
                placeholder="Načítám"
              >
              <button id="import-button" class="primary-button" type="button">Načíst</button>
            </div>
          </div>
        </div>

        <div class="plan-actions-row">
          <button id="restore-defaults-button" class="secondary-button" type="button">Výchozí plán</button>
          <button id="clear-selection-button" class="ghost-button" type="button">Vymazat</button>
          <button id="plan-actions-close-text-button" class="ghost-button" type="button" data-close-plan-actions>Zavřít</button>
        </div>
      </div>
    </aside>

    <div id="event-detail-backdrop" class="event-detail-backdrop" hidden></div>
    <aside
      id="event-detail-panel"
      class="event-detail-panel"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="event-detail-title"
    >
      <div id="event-detail-content"></div>
    </aside>

    <script type="module" src="./app.js"></script>
  </body>
</html>
